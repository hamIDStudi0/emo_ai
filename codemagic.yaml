# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - FORMAT FINAL VALIDASI SAH
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 30

    environment:
      flutter: stable
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.example.emo_ai"
        CM_KEYSTORE_PATH: "/tmp/keystore.p12"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'

    scripts:
      - name: 1. Lahirkan Folder Android Bersih
        script: |
          rm -rf android
          flutter create . --platforms=android --overwrite

      - name: 2. Rekonstruksi File .p12 dari Teks Base64
        script: |
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > $CM_KEYSTORE_PATH

      - name: 3. Suntik Konfigurasi Keystore ke key.properties
        script: |
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties
          echo "storeType=PKCS12" >> android/key.properties

      - name: 4. Tulis Ulang build.gradle Rilis (Lolos Play Protect)
        script: |
          # Menghapus file build.gradle bawaan yang sering hilang/konflik
          rm -f android/app/build.gradle
          
          # Membuat file build.gradle rilis baru yang super aman dari nol
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "com.example.emo_ai"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              defaultConfig {
                  applicationId "com.example.emo_ai"
                  minSdk flutter.minSdkVersion
                  targetSdk flutter.targetSdkVersion
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                      storeType 'PKCS12'
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF

      - name: 5. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 6. Merakit File APK Rilis dengan Proteksi
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 7. Verifikasi Signing
        script: |
          jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk || true

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
