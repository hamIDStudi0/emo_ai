# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - FORMAT FINAL VALIDASI SAH
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    
    environment:
      flutter: stable
      # Cukup panggil nama referensi yang Anda buat saat upload tadi
      android_signing:
        - my_keystore   
      vars:
        PACKAGE_NAME: "com.example.emo_ai"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'

    scripts:
      - name: 1. Lahirkan Folder Android Bersih
        script: |
          flutter create . --platforms=android

      - name: 2. Suntik Konfigurasi Keystore (Otomatis Membaca File .p12)
        script: |
          # Codemagic otomatis merubah file .p12 Anda menjadi variabel $CM_KEYSTORE_PATH
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties

      - name: 3. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 4. Merakit File APK Rilis
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
