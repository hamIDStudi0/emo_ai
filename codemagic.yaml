# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - FORMAT FINAL VALIDASI SAH
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1 # Menggunakan VM macOS
    max_build_duration: 30
    
    environment:
      flutter: stable
      android_signing:
        - my_keystore   # WAJIB: Sesuai dengan nama referensi di dashboard Codemagic Anda
      vars:
        PACKAGE_NAME: "com.example.emo_ai"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main' # Otomatis rilis saat ada push ke branch main

    scripts:
      - name: 1. Lahirkan Folder Android Bersih
        script: |
          flutter create . --platforms=android

      - name: 2. Suntik Konfigurasi Keystore (Aman & Otomatis)
        script: |
          # Membuat file key.properties yang otomatis dibaca oleh build.gradle bawaan Flutter
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties

      - name: 3. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 4. Merakit File APK Rilis
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
