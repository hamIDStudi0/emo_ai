# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - FORMAT FINAL VALIDASI SAH
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 30

    environment:
      flutter: stable
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.example.emo_ai"
        CM_KEYSTORE_PATH: "/tmp/keystore.p12"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'

    scripts:
      - name: 1. Lahirkan Folder Android Bersih
        script: |
          rm -rf android
          flutter create . --platforms=android --overwrite

      - name: 2. Rekonstruksi File .p12 dari Teks Base64
        script: |
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > $CM_KEYSTORE_PATH

      - name: 3. Suntik Konfigurasi Keystore ke key.properties
        script: |
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties
          # Memaksa Gradle mengenali format sertifikat .p12 Anda
          echo "storeType=PKCS12" >> android/key.properties

      - name: 4. Optimasi build.gradle secara Aman (ProGuard & Minify)
        script: |
          # Mengaktifkan pengecilan ukuran APK dan pengaburan kode ProGuard langsung di baris rilis bawaan Flutter
          sed -i '' 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' android/app/build.gradle
          
          # Menyisipkan aturan optimasi biner agar aplikasi lebih ringan dan sulit didekompilasi
          # Ini memodifikasi blok buildTypes.release bawaan Flutter tanpa merusak strukturnya
          sed -i '' '/buildTypes {/a\
          \        release {\
          \            minifyEnabled true\
          \            shrinkResources true\
          \            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"\
          \        }
          ' android/app/build.gradle

      - name: 5. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 6. Merakit File APK Rilis dengan Proteksi
        script: |
          # Ditambah fitur pengaburan kode bawaan Flutter untuk mengamankan string kode Anda
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 7. Verifikasi Signing
        script: |
          jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk || true

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
