# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - FORMAT FINAL VALIDASI SAH
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    
    environment:
      flutter: stable
      # Mengimpor grup variabel yang kita buat di dashboard tadi
      groups:
        - keystore_credentials 
      vars:
        PACKAGE_NAME: "com.example.emo_ai"
        # Menentukan jalur folder sementara untuk menyimpan file .p12 hasil decode
        CM_KEYSTORE_PATH: "/tmp/keystore.p12"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'

    scripts:
      - name: 1. Lahirkan Folder Android Bersih
        script: |
          flutter create . --platforms=android

      - name: 2. Rekonstruksi File .p12 dari Teks Base64
        script: |
          # Mengubah kembali teks Base64 rahasia menjadi file fisik di dalam mesin
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > $CM_KEYSTORE_PATH

      - name: 3. Suntik Konfigurasi Keystore ke key.properties
        script: |
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties

      - name: 4. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 5. Merakit File APK Rilis
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
