# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - METODE FRESH RE-CLONE 
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 30

    environment:
      flutter: stable
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.example.emo_ai"
        CM_KEYSTORE_PATH: "/tmp/keystore.p12"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'

    scripts:
      - name: 1. Rekonstruksi Struktur Project Baru & Bersih
        script: |
          # 1. Amankan file kode inti Anda ke folder sementara
          mkdir -p /tmp/core_app
          cp -r lib /tmp/core_app/
          cp pubspec.yaml /tmp/core_app/
          [ -d "assets" ] && cp -r assets /tmp/core_app/ || echo "No assets folder"

          # 2. Hapus seluruh isi folder kerja saat ini tanpa sisa
          rm -rf * .??*

          # 3. Buat proyek Flutter baru dari nol (Pondasi Gradle paling modern)
          flutter create . --project-name=emo_ai --org=com.example --platforms=android

          # 4. Kembalikan file kode inti Anda ke proyek baru
          rm -rf lib pubspec.yaml assets
          cp -r /tmp/core_app/lib .
          cp /tmp/core_app/pubspec.yaml .
          [ -d "/tmp/core_app/assets" ] && cp -r /tmp/core_app/assets . || echo "No assets to restore"

      - name: 2. Rekonstruksi File .p12 dari Teks Base64
        script: |
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > $CM_KEYSTORE_PATH

      - name: 3. Suntik Konfigurasi Keystore ke key.properties
        script: |
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties
          echo "storeType=PKCS12" >> android/key.properties

      - name: 4. Suntik Pengaturan Rilis ke build.gradle Baru
        script: |
          # Menyisipkan konfigurasi tanda tangan rilis ke build.gradle baru yang suci dari error
          printf '\n\n
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties["keyAlias"]
                      keyPassword keystoreProperties["keyPassword"]
                      storeFile file(keystoreProperties["storeFile"])
                      storePassword keystoreProperties["storePassword"]
                      storeType "PKCS12"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
                  }
              }
          }
          ' >> android/app/build.gradle

      - name: 5. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 6. Merakit File APK Rilis dengan Proteksi
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 7. Verifikasi Signing
        script: |
          jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk || true

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
