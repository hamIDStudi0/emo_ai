# ====================================================================
# CETAK BIRU PERAKITAN OTOMATIS EMO.AI - METODE FRESH RE-CLONE 
# ====================================================================
workflows:
  android-release:
    name: Emo AI Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 30

    environment:
      flutter: stable
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.example.emo_ai"
        CM_KEYSTORE_PATH: "/tmp/keystore.p12"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'

    scripts:
      - name: 1. Rekonstruksi Struktur Project Baru & Bersih
        script: |
          # 1. Amankan file kode inti Anda ke folder sementara
          mkdir -p /tmp/core_app
          cp -r lib /tmp/core_app/
          cp pubspec.yaml /tmp/core_app/
          [ -d "assets" ] && cp -r assets /tmp/core_app/ || echo "No assets folder"

          # 2. Hapus seluruh isi folder kerja saat ini tanpa sisa
          rm -rf * .??*

          # 3. Buat proyek Flutter baru dari nol (Pondasi Gradle paling modern)
          flutter create . --project-name=emo_ai --org=com.example --platforms=android

          # 4. Kembalikan file kode inti Anda ke proyek baru
          rm -rf lib pubspec.yaml assets
          cp -r /tmp/core_app/lib .
          cp /tmp/core_app/pubspec.yaml .
          [ -d "/tmp/core_app/assets" ] && cp -r /tmp/core_app/assets . || echo "No assets to restore"

      - name: 2. Rekonstruksi File .p12 dari Teks Base64
        script: |
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > $CM_KEYSTORE_PATH

      - name: 3. Suntik Konfigurasi Keystore ke key.properties
        script: |
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/key.properties
          echo "storeType=PKCS12" >> android/key.properties

      - name: 4. Suntik Pengaturan Rilis ke build.gradle Baru
        script: |
          # android.newDsl=false: AGP 9.x defaultnya pakai DSL baru yang
          # mengubah tipe extension android{} (BaseAppModuleExtension ->
          # ApplicationExtension) — ini kembalikan ke perilaku lama yang
          # masih resmi didukung sampai AGP 10.
          echo "android.newDsl=false" >> android/gradle.properties

          # PENTING: konfigurasi signing DISISIPKAN LANGSUNG ke dalam blok
          # android{} yang SUDAH ADA dari template Flutter (bukan membuat
          # blok android{} kedua terpisah di bawah). Percobaan sebelumnya
          # pakai blok kedua gagal dengan "SigningConfig with name 'release'
          # not found" karena urutan eksekusi dua invocation android{} yang
          # terpisah tidak terjamin — signingConfigs.create() di blok kedua
          # kadang belum tuntas saat buildTypes di blok lain mencarinya.
          # Menyisipkan ke dalam satu blok yang sama menghilangkan masalah
          # ini sepenuhnya karena urutan baris di dalam SATU blok itu pasti
          # sekuensial.
          python3 << 'PYEOF'
          import re, pathlib

          kts = pathlib.Path("android/app/build.gradle.kts")
          groovy = pathlib.Path("android/app/build.gradle")

          if kts.exists():
              text = kts.read_text()
              text = "import java.util.Properties\nimport java.io.FileInputStream\n\n" + text

              signing_block = (
                  "\n    signingConfigs {\n"
                  "        create(\"release\") {\n"
                  "            val keystoreProperties = Properties()\n"
                  "            val keystorePropertiesFile = rootProject.file(\"key.properties\")\n"
                  "            if (keystorePropertiesFile.exists()) {\n"
                  "                keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n"
                  "            }\n"
                  "            keyAlias = keystoreProperties.getProperty(\"keyAlias\")\n"
                  "            keyPassword = keystoreProperties.getProperty(\"keyPassword\")\n"
                  "            storeFile = file(keystoreProperties.getProperty(\"storeFile\")!!)\n"
                  "            storePassword = keystoreProperties.getProperty(\"storePassword\")\n"
                  "            storeType = \"PKCS12\"\n"
                  "        }\n"
                  "    }\n"
              )
              # Sisipkan TEPAT setelah baris pembuka 'android {' pertama, jadi
              # dijamin ada sebelum buildTypes diproses di bawahnya.
              text, n = re.subn(r'(android\s*\{)', r'\1' + signing_block, text, count=1)
              if n == 0:
                  raise SystemExit("Tidak menemukan blok 'android {' di build.gradle.kts")

              # Arahkan release build type ke signingConfig "release" yang
              # baru dibuat (template Flutter defaultnya memakai "debug").
              text, n2 = re.subn(
                  r'signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)',
                  'signingConfig = signingConfigs.getByName("release")',
                  text,
              )
              if n2 == 0:
                  print("PERINGATAN: baris signingConfig debug default tidak ditemukan — cek manual build.gradle.kts")

              # file_picker (lewat flutter_plugin_android_lifecycle) minta
              # compileSdk >= 36, sementara default Flutter masih memakai
              # flutter.compileSdkVersion (biasanya 34). SDK 36 sudah otomatis
              # ter-install oleh Codemagic di step Gradle sebelumnya — di sini
              # cukup arahkan compileSdk project ke 36 secara eksplisit.
              text, n_sdk = re.subn(
                  r'compileSdk\s*=\s*flutter\.compileSdkVersion',
                  'compileSdk = 36',
                  text,
              )
              if n_sdk == 0:
                  print("PERINGATAN: baris compileSdk default tidak ditemukan — cek manual build.gradle.kts")

              if "isMinifyEnabled" not in text:
                  text, _ = re.subn(
                      r'(signingConfig = signingConfigs\.getByName\("release"\))',
                      r'\1\n            isMinifyEnabled = true\n            isShrinkResources = true\n'
                      r'            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")',
                      text,
                      count=1,
                  )
              kts.write_text(text)
              print("Berhasil menyisipkan signing config ke build.gradle.kts")

          elif groovy.exists():
              text = groovy.read_text()
              signing_block = (
                  "\n    signingConfigs {\n"
                  "        release {\n"
                  "            def keystoreProperties = new Properties()\n"
                  "            def keystorePropertiesFile = rootProject.file(\"key.properties\")\n"
                  "            if (keystorePropertiesFile.exists()) {\n"
                  "                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n"
                  "            }\n"
                  "            keyAlias keystoreProperties[\"keyAlias\"]\n"
                  "            keyPassword keystoreProperties[\"keyPassword\"]\n"
                  "            storeFile file(keystoreProperties[\"storeFile\"])\n"
                  "            storePassword keystoreProperties[\"storePassword\"]\n"
                  "            storeType \"PKCS12\"\n"
                  "        }\n"
                  "    }\n"
              )
              text, n = re.subn(r'(android\s*\{)', r'\1' + signing_block, text, count=1)
              if n == 0:
                  raise SystemExit("Tidak menemukan blok 'android {' di build.gradle")
              text, n2 = re.subn(
                  r'signingConfig\s+signingConfigs\.debug',
                  'signingConfig signingConfigs.release',
                  text,
              )
              if n2 == 0:
                  print("PERINGATAN: baris signingConfig debug default tidak ditemukan — cek manual build.gradle")
              text, n_sdk = re.subn(
                  r'compileSdkVersion\s+flutter\.compileSdkVersion',
                  'compileSdkVersion 36',
                  text,
              )
              if n_sdk == 0:
                  print("PERINGATAN: baris compileSdkVersion default tidak ditemukan — cek manual build.gradle")
              if "minifyEnabled" not in text:
                  text, _ = re.subn(
                      r'(signingConfig signingConfigs\.release)',
                      r'\1\n            minifyEnabled true\n            shrinkResources true\n'
                      r'            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"',
                      text,
                      count=1,
                  )
              groovy.write_text(text)
              print("Berhasil menyisipkan signing config ke build.gradle")
          else:
              raise SystemExit("Tidak ada android/app/build.gradle(.kts) ditemukan")
          PYEOF

      - name: 5. Unduh Pustaka Dependencies
        script: |
          flutter pub get

      - name: 6. Merakit File APK Rilis dengan Proteksi
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 7. Verifikasi Signing
        script: |
          jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk || true

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
